name: PyMOLViewer
options:
  bundleIdPrefix: org.pymol
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_ENABLE_MODULES: YES
    SWIFT_OBJC_BRIDGING_HEADER: PyMOLViewer/Bridge/PyMOLBridge.h
    # Do NOT add PyMOL layer paths here — layer0/Block.h shadows the
    # system Block.h and breaks Clang module builds for CoreFoundation.
    # PyMOL include paths are set per-file on PyMOLBridge.mm only.
    LIBRARY_SEARCH_PATHS:
      - $(SRCROOT)/../build_appkit
      - /opt/homebrew/lib
      - /opt/homebrew/opt/python@3.14/Frameworks/Python.framework/Versions/3.14/lib
    FRAMEWORK_SEARCH_PATHS:
      - /opt/homebrew/opt/python@3.14/Frameworks
    OTHER_LDFLAGS:
      - -lpymol_core
      - -lfreetype
      - -lpng16
      - -lGLEW
      - -lxml2
      - -lpython3.14
      - -framework Metal
      - -framework MetalKit
      - -framework OpenGL
      - -framework CoreVideo

targets:
  PyMOLViewer:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: PyMOLViewer
        excludes:
          - "**/*.md"
        compilerFlags:
          # Default flags for all files (Swift files ignore these)
          - ""
      - path: PyMOLViewer/Bridge/PyMOLBridge.mm
        compilerFlags:
          # PyMOL include paths ONLY for the ObjC++ bridge file
          - -I$(SRCROOT)/../include
          - -I$(SRCROOT)/../include/pymol
          - -I$(SRCROOT)/../layer0
          - -I$(SRCROOT)/../layer1
          - -I$(SRCROOT)/../layer2
          - -I$(SRCROOT)/../layer3
          - -I$(SRCROOT)/../layer4
          - -I$(SRCROOT)/../layer5
          - -I$(SRCROOT)/../layerGraphics
          - -I$(SRCROOT)/../layerGraphics/metal
          - -I$(SRCROOT)/../contrib
          - -I$(SRCROOT)/../contrib/pocketfft
          - -I$(SRCROOT)/../build_appkit/generated
          - -I/opt/homebrew/include
          - -I/opt/homebrew/opt/python@3.14/Frameworks/Python.framework/Versions/3.14/include/python3.14
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pymol.viewer
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PyMOL
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies: []
    scheme:
      testTargets: []
      gatherCoverageData: false
