name: PyMOLViewer
options:
  bundleIdPrefix: org.pymol
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: PyMOLBridge.xcconfig
  Release: PyMOLBridge.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_ENABLE_MODULES: YES
    SWIFT_OBJC_BRIDGING_HEADER: PyMOLViewer/Bridge/PyMOLBridge.h
    # Do NOT add PyMOL layer paths to HEADER_SEARCH_PATHS —
    # layer0/Block.h shadows the system Block.h and breaks module builds.
    # All paths and flags are in PyMOLBridge.xcconfig.
    LIBRARY_SEARCH_PATHS:
      - $(SRCROOT)/../build_appkit
      - /opt/homebrew/lib
      - /opt/homebrew/opt/python@3.14/Frameworks/Python.framework/Versions/3.14/lib
    FRAMEWORK_SEARCH_PATHS:
      - /opt/homebrew/opt/python@3.14/Frameworks

targets:
  PyMOLViewer:
    type: application
    platform: [macOS, iOS]
    sources:
      - path: PyMOLViewer
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pymol.viewer
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PyMOL
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies: []
    scheme:
      testTargets: []
      gatherCoverageData: false
